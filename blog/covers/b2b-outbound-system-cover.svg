<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow6" cx="50%" cy="42%" r="30%">
      <stop offset="0%" style="stop-color:#ffb23e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffb23e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg6)"/>
  <!-- Orange glow -->
  <rect width="1200" height="630" fill="url(#glow6)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#ffb23e"/>
  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>
  <!-- Category tag -->
  <rect x="900" y="40" width="160" height="36" rx="18" fill="rgba(255,178,62,0.15)" stroke="rgba(255,178,62,0.4)" stroke-width="1"/>
  <text x="980" y="63" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffb23e" letter-spacing="2">STRATEGY</text>
  <!-- Large emoji icon -->
  <text x="600" y="310" text-anchor="middle" font-size="160" font-family="Arial, sans-serif">🏗️</text>
  <!-- Title text -->
  <text x="64" y="500" font-family="'Arial Black', Arial, sans-serif" font-size="44" font-weight="900" fill="white" letter-spacing="1">How to Build a B2B Outbound</text>
  <text x="64" y="556" font-family="'Arial Black', Arial, sans-serif" font-size="44" font-weight="900" fill="#ffb23e" letter-spacing="1">System That Scales</text>
  <!-- Arvani Media branding -->
  <text x="1136" y="602" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)" letter-spacing="2">ARVANI MEDIA</text>
  <!-- Bottom line accent -->
  <rect x="64" y="580" width="120" height="3" rx="2" fill="#ffb23e"/>
</svg>
