<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Subtle dot grid overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Right-side decorative circles -->
  <circle cx="980" cy="315" r="320" fill="none" stroke="#ffb23e" stroke-width="1" opacity="0.12"/>
  <circle cx="980" cy="315" r="240" fill="none" stroke="#ffb23e" stroke-width="1" opacity="0.09"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="#ffb23e" stroke-width="1" opacity="0.07"/>
  <circle cx="980" cy="315" r="80" fill="#ffb23e" opacity="0.06"/>

  <!-- Left orange accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#ffb23e"/>

  <!-- Top horizontal rule -->
  <rect x="80" y="90" width="240" height="2" fill="#ffb23e" opacity="0.6"/>

  <!-- Brand wordmark -->
  <text
    x="80" y="260"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="90"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="7"
  >ARVANI MEDIA</text>

  <!-- Orange accent line below brand -->
  <rect x="80" y="282" width="150" height="4" fill="#ffb23e"/>

  <!-- Tagline -->
  <text
    x="80" y="350"
    font-family="'Arial', sans-serif"
    font-size="28"
    font-weight="400"
    fill="rgba(255,255,255,0.62)"
    letter-spacing="4"
  >DONE-FOR-YOU B2B OUTBOUND</text>

  <!-- Sub-tagline -->
  <text
    x="80" y="400"
    font-family="'Arial', sans-serif"
    font-size="18"
    fill="rgba(255,255,255,0.32)"
    letter-spacing="1"
  >Cold Email  ·  LinkedIn Outreach  ·  AI Automations</text>

  <!-- Bottom separator -->
  <rect x="0" y="568" width="1200" height="1" fill="rgba(255,178,62,0.18)"/>

  <!-- Domain -->
  <text
    x="80" y="600"
    font-family="'Arial', sans-serif"
    font-size="20"
    fill="#ffb23e"
    letter-spacing="1"
  >arvani-media.com</text>

  <!-- Arrow decoration -->
  <text
    x="1120" y="600"
    font-family="'Arial', sans-serif"
    font-size="22"
    fill="rgba(255,178,62,0.45)"
    text-anchor="end"
  >→</text>
</svg>
